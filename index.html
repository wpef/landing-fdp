<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fils de Projet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── THEME TOKENS ─────────────────────────────────────────────── */
  :root {
    /* Client (green) — default */
    --accent: #00c853;
    --accent-hover: #00e060;
    --accent-dim: rgba(0, 200, 83, 0.08);
    --accent-border: rgba(0, 200, 83, 0.2);
    --accent-glow: rgba(0,200,83,0.9);
    --accent-glow-soft: rgba(0,200,83,0.45);
    --accent-text: #000;
    --accent-radial: rgba(0,200,83,0.06);
    --lit-bg: #0d1a12;

    --bg: #0a0a0a;
    --surface: #111111;
    --surface-2: #161616;
    --surface-3: #1c1c1c;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.12);
    --text: #e8e8e8;
    --text-muted: #6b6b6b;
    --text-dim: #4a4a4a;
    --white: #ffffff;
    --radius: 8px;
    --radius-sm: 5px;
    --nav-bg: rgba(10,10,10,0.92);
    --terminal-bg: #080808;
  }

  [data-mode="agence"] {
    --accent: #4f8cff;
    --accent-hover: #6aa0ff;
    --accent-dim: rgba(79, 140, 255, 0.08);
    --accent-border: rgba(79, 140, 255, 0.2);
    --accent-glow: rgba(79,140,255,0.9);
    --accent-glow-soft: rgba(79,140,255,0.45);
    --accent-text: #fff;
    --accent-radial: rgba(79,140,255,0.05);
    --lit-bg: #0d1020;

    --bg: #0a0a0f;
    --surface: #0f0f18;
    --surface-2: #14141f;
    --surface-3: #1a1a28;
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.10);
    --text: #dcdce8;
    --text-muted: #6b6b88;
    --text-dim: #3e3e55;
    --nav-bg: rgba(10,10,15,0.92);
    --terminal-bg: #060610;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    transition: background 0.5s;
  }

  /* ── MODE TOGGLE ──────────────────────────────────────────────── */
  .mode-content { display: none; }
  [data-mode="client"] .client-only { display: contents; }
  [data-mode="agence"] .agence-only { display: contents; }

  /* ── FLOATING MODE SWITCH ──────────────────────────────────── */
  .mode-switch {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 0;
    background: rgba(18, 18, 18, 0.85);
    border: 1px solid var(--accent-border);
    border-radius: 100px;
    padding: 4px 5px;
    cursor: pointer;
    user-select: none;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.3),
      0 4px 24px rgba(0,0,0,0.5),
      0 0 40px -10px var(--accent-glow-soft);
    transition: background 0.5s, border-color 0.5s, box-shadow 0.5s;
  }
  .mode-switch:hover {
    border-color: var(--accent);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.3),
      0 4px 24px rgba(0,0,0,0.5),
      0 0 60px -5px var(--accent-glow-soft);
  }
  .mode-switch-option {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 8px 20px;
    border-radius: 100px;
    color: var(--text-muted);
    transition: color 0.3s;
    position: relative;
    z-index: 1;
    white-space: nowrap;
  }
  .mode-switch-option.active { color: var(--accent-text); font-weight: 700; }
  .mode-switch-pill {
    position: absolute;
    top: 4px;
    height: calc(100% - 8px);
    background: var(--accent);
    border-radius: 100px;
    transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1), width 0.35s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s;
    z-index: 0;
    box-shadow: 0 2px 12px var(--accent-glow-soft);
  }

  /* ── NAV ───────────────────────────────────────────────────────── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 56px;
    background: var(--nav-bg);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    transition: background 0.5s;
  }
  .nav-left { display: flex; align-items: center; gap: 32px; }
  .nav-logo { display: flex; flex-direction: column; line-height: 1.15; }
  .nav-logo .logo-line { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: baseline; transition: color 0.5s; }
  .nav-logo .initial { font-size: 14px; font-weight: 700; color: var(--accent); text-shadow: 0 0 6px var(--accent-glow), 0 0 16px var(--accent-glow-soft); letter-spacing: 0; line-height: 1; margin-right: 2px; transition: color 0.5s, text-shadow 0.5s; }
  .nav-links { display: flex; gap: 4px; list-style: none; }
  .nav-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; padding: 5px 12px; border-radius: var(--radius-sm); transition: color 0.15s, background 0.15s; }
  .nav-links a:hover { color: var(--text); background: var(--surface-2); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .btn-nav { font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif; padding: 7px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; transition: all 0.3s; }
  .btn-nav-ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border-strong); }
  .btn-nav-ghost:hover { background: var(--surface-3); }
  .btn-nav-primary { background: var(--accent); color: var(--accent-text); }
  .btn-nav-primary:hover { background: var(--accent-hover); }

  /* ── HERO ──────────────────────────────────────────────────────── */
  .hero { max-width: 900px; margin: 0 auto; padding: 96px 32px 80px; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-border); padding: 4px 12px; border-radius: 100px; margin-bottom: 32px; transition: all 0.5s; }

  .hero-title {
    font-size: clamp(38px, 5.5vw, 68px);
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.03em;
    color: var(--white);
    margin-bottom: 20px;
  }
  .hero-title .hero-intro {
    display: block;
    font-size: clamp(12px, 1.2vw, 14px);
    font-weight: 400;
    letter-spacing: 0;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .hero-title .fdp-static {
    color: var(--text-muted);
    font-weight: 400;
    font-style: italic;
  }

  /* Client scrub animation */
  .hero-title .fdp-scrub-char {
    display: inline-block;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .hero-title .fdp-scrub-char.ellipsis {
    color: var(--accent);
    font-weight: 600;
    font-style: normal;
  }
  .hero-title .fdp-scrub-char.projet-word {
    color: var(--text-muted);
    font-weight: 400;
    font-style: italic;
  }

  /* Agence swap animation */
  .hero-word-swap { display: inline-block; position: relative; }
  .hero-word-chef {
    display: inline-block;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .hero-word-fils {
    display: inline-block;
    position: absolute;
    left: 0; top: 0;
    white-space: nowrap;
    color: var(--accent);
    text-shadow: 0 0 40px var(--accent-glow-soft);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  .hero-word-swap.revealed .hero-word-chef { opacity: 0; transform: translateY(-6px); }
  .hero-word-swap.revealed .hero-word-fils { opacity: 1; transform: translateY(0); }

  .hero-reveal-hint {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 1;
    transition: opacity 0.4s;
  }
  .hero-reveal-hint.hidden { opacity: 0; pointer-events: none; }
  .hero-reveal-hint::before { content: '↓'; font-size: 10px; animation: bounce-hint 1.5s infinite; }

  .hero-desc { font-size: 16px; color: var(--text-muted); line-height: 1.7; max-width: 560px; margin-bottom: 40px; }
  .hero-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn-primary { font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif; padding: 10px 20px; border-radius: var(--radius-sm); background: var(--accent); color: var(--accent-text); border: none; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.3s; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif; padding: 10px 20px; border-radius: var(--radius-sm); background: transparent; color: var(--text); border: 1px solid var(--border-strong); cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .btn-secondary:hover { background: var(--surface-2); }
  .hero-meta { display: flex; gap: 24px; margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .hero-meta-item { display: flex; flex-direction: column; gap: 4px; }
  .hero-meta-val { font-size: 22px; font-weight: 600; color: var(--white); }
  .hero-meta-label { font-size: 12px; color: var(--text-muted); }

  /* ── SECTIONS ──────────────────────────────────────────────────── */
  .section { max-width: 900px; margin: 0 auto; padding: 64px 32px; border-top: 1px solid var(--border); }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
  .section-title { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; color: var(--white); margin-bottom: 12px; line-height: 1.25; }
  .section-desc { font-size: 14px; color: var(--text-muted); max-width: 520px; line-height: 1.7; margin-bottom: 40px; }

  /* ── PAIN GRID ─────────────────────────────────────────────────── */
  .pain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .pain-item { background: var(--surface); padding: 24px; transition: background 0.3s; }
  .pain-item:hover { background: var(--surface-2); }
  .pain-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--surface-3); border: 1px solid var(--border-strong); display: flex; align-items: center; justify-content: center; font-size: 14px; margin-bottom: 14px; }
  .pain-title { font-size: 14px; font-weight: 500; color: var(--white); margin-bottom: 6px; }
  .pain-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .pain-quote { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-style: italic; }

  /* ── AUDIT / MATCHING CARD ─────────────────────────────────────── */
  .audit-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
  .audit-card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .audit-card-title { font-size: 14px; font-weight: 500; color: var(--white); display: flex; align-items: center; gap: 10px; }
  .tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 100px; }
  .tag-accent { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); transition: all 0.5s; }
  .tag-grey { background: var(--surface-3); color: var(--text-muted); border: 1px solid var(--border); }
  .audit-card-body { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
  .audit-item-title { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .audit-item-val { font-size: 13px; color: var(--text); line-height: 1.5; }

  /* ── OUTCOMES ──────────────────────────────────────────────────── */
  .outcomes-wrapper {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 0;
    margin-top: 8px;
    align-items: stretch;
  }
  .audit-arrow-col {
    position: relative;
    width: 60px;
  }
  /* Trunk: dim background track + lit overlay */
  .audit-arrow-trunk-track {
    position: absolute;
    left: 29px;
    top: 0;
    width: 2px;
    height: 100%;
    background: var(--border);
    border-radius: 1px;
  }
  .audit-arrow-trunk {
    position: absolute;
    left: 29px;
    top: 0;
    width: 2px;
    height: 0;
    background: var(--accent);
    border-radius: 1px;
    box-shadow: 0 0 8px var(--accent-glow-soft), 0 0 20px var(--accent-glow-soft);
  }
  /* Branches: dim track + lit overlay */
  .audit-arrow-branch-track {
    position: absolute;
    left: 29px;
    height: 2px;
    width: 31px;
    background: var(--border);
    border-radius: 1px;
  }
  .audit-arrow-branch {
    position: absolute;
    left: 29px;
    height: 2px;
    width: 0;
    background: var(--accent);
    border-radius: 1px;
    box-shadow: 0 0 8px var(--accent-glow-soft), 0 0 20px var(--accent-glow-soft);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .audit-arrow-branch.visible { width: 31px; }
  /* Arrowhead */
  .audit-arrow-head {
    position: absolute;
    left: 54px;
    width: 0; height: 0;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-left: 7px solid var(--border);
    transform: translateY(-4px);
    transition: border-left-color 0.3s, filter 0.3s;
  }
  .audit-arrow-head.visible {
    border-left-color: var(--accent);
    filter: drop-shadow(0 0 4px var(--accent-glow-soft));
  }
  .outcomes-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .outcome-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 0.4s, background 0.4s, box-shadow 0.4s, transform 0.4s;
    transform: translateY(0);
  }
  .outcome-card.lit {
    border-color: var(--accent);
    background: var(--lit-bg);
    box-shadow:
      0 0 0 1px var(--accent-border),
      0 0 24px -4px var(--accent-glow-soft),
      0 8px 32px -8px rgba(0,0,0,0.4);
    transform: translateY(-3px);
  }
  .outcome-card:hover { border-color: var(--border-strong); background: var(--surface-2); }
  .outcome-icon { font-size: 18px; margin-bottom: 12px; }
  .outcome-title { font-size: 14px; font-weight: 500; color: var(--white); margin-bottom: 6px; transition: color 0.3s; }
  .outcome-card.lit .outcome-title { color: var(--accent); }
  .outcome-desc { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

  /* ── PRICE BLOCK ──────────────────────────────────────────────── */
  .price-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 32px; }
  .price-block-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface-2); }
  .price-block-body { display: flex; align-items: center; gap: 0; padding: 0; }
  .price-tier { flex: 1; padding: 24px; }
  .price-tier-amount { font-size: 36px; font-weight: 600; color: var(--white); letter-spacing: -0.02em; line-height: 1; margin-bottom: 8px; }
  .price-tier-label { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .price-tier-detail { font-size: 12px; color: var(--text-muted); }
  .price-tier:first-child { border-right: 1px solid var(--border); }
  .price-tier-sep { font-size: 18px; color: var(--text-dim); padding: 0 4px; flex-shrink: 0; }
  .price-block-footer { padding: 10px 24px; font-size: 11px; color: var(--text-dim); border-top: 1px solid var(--border); background: var(--surface-2); letter-spacing: 0.04em; }
  /* Single-price variant (agence) */
  .price-block-single { display: flex; align-items: center; padding: 24px; gap: 24px; }
  .price-block-amount { font-size: 48px; font-weight: 600; color: var(--white); letter-spacing: -0.03em; line-height: 1; }
  .price-block-detail { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
  .price-block-detail strong { color: var(--text); font-weight: 500; }

  /* ── PLANS ─────────────────────────────────────────────────────── */
  .plans-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .plan-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; display: flex; flex-direction: column; transition: border-color 0.15s; }
  .plan-card:hover { border-color: var(--border-strong); }
  .plan-card.featured { border-color: var(--accent-border); background: var(--lit-bg); }
  .plan-name { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .plan-card.featured .plan-name { color: var(--accent); }
  .plan-price { font-size: 36px; font-weight: 600; color: var(--white); letter-spacing: -0.02em; line-height: 1; margin-bottom: 4px; }
  .plan-period { font-size: 12px; color: var(--text-muted); margin-bottom: 24px; }
  .plan-divider { height: 1px; background: var(--border); margin-bottom: 20px; }
  .plan-card.featured .plan-divider { background: var(--accent-border); }
  .plan-features { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; flex: 1; }
  .plan-feature { font-size: 13px; color: var(--text-muted); display: flex; gap: 10px; align-items: flex-start; line-height: 1.5; }
  .plan-feature-check { color: var(--accent); flex-shrink: 0; margin-top: 1px; }
  .plan-ideal { font-size: 11px; color: var(--text-dim); font-style: italic; margin-bottom: 16px; padding: 8px 12px; background: var(--surface-3); border-radius: var(--radius-sm); line-height: 1.5; }
  .plan-cta { display: block; text-align: center; font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif; padding: 9px 16px; border-radius: var(--radius-sm); text-decoration: none; transition: all 0.15s; cursor: pointer; border: none; }
  .plan-cta-default { background: var(--surface-3); color: var(--text); border: 1px solid var(--border-strong); }
  .plan-cta-default:hover { background: var(--surface-2); }
  .plan-cta-featured { background: var(--accent); color: var(--accent-text); }
  .plan-cta-featured:hover { background: var(--accent-hover); }

  /* ── CONDITIONS ────────────────────────────────────────────────── */
  .conditions-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-top: 16px; }
  .conditions-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 14px; }
  .conditions-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .conditions-item { display: flex; align-items: flex-start; gap: 12px; font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .conditions-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 7px; transition: background 0.5s; }

  /* ── TERMINAL ──────────────────────────────────────────────────── */
  .terminal { background: var(--terminal-bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 32px; }
  .terminal-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .terminal-filename { font-size: 11px; color: var(--text-dim); margin-left: 10px; font-family: 'DM Mono', monospace; }
  .terminal-body { padding: 20px 24px; font-family: 'DM Mono', monospace; font-size: 12px; line-height: 2; }
  .t-line { display: block; }
  .t-prompt { color: var(--accent); user-select: none; transition: color 0.5s; }
  .t-cmd { color: var(--text); }
  .t-comment { color: var(--text-dim); }
  .t-out { color: #888; }
  .t-success { color: var(--accent); transition: color 0.5s; }
  .t-warn { color: #f0a500; }
  .t-blink::after { content: '▋'; color: var(--accent); animation: blink 1s infinite; }

  /* ── CTA ───────────────────────────────────────────────────────── */
  .cta-section { max-width: 900px; margin: 0 auto; padding: 80px 32px; border-top: 1px solid var(--border); }
  .cta-inner { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 56px 48px; text-align: center; position: relative; overflow: hidden; }
  .cta-inner::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 60% at 50% -10%, var(--accent-radial) 0%, transparent 60%); pointer-events: none; transition: background 0.5s; }
  .cta-title { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; color: var(--white); margin-bottom: 12px; line-height: 1.2; }
  .cta-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
  .cta-sub2 { font-size: 13px; color: var(--text-dim); margin-bottom: 32px; font-style: italic; }
  .cta-hint { font-size: 12px; color: var(--text-dim); margin-top: 16px; }

  /* ── FOOTER ────────────────────────────────────────────────────── */
  footer { border-top: 1px solid var(--border); padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; overflow: hidden; }
  .footer-logo { display: flex; flex-direction: column; line-height: 1.15; flex-shrink: 0; }
  .footer-logo .logo-line { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: baseline; }
  .footer-logo .initial { font-size: 14px; font-weight: 700; color: var(--accent); text-shadow: 0 0 6px var(--accent-glow), 0 0 16px var(--accent-glow-soft); letter-spacing: 0; line-height: 1; margin-right: 2px; transition: all 0.5s; }
  .footer-links { display: flex; gap: 24px; flex-wrap: wrap; overflow: hidden; }
  .footer-links span { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .footer-right { font-size: 12px; color: var(--text-dim); flex-shrink: 0; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes bounce-hint { 0%,100% { transform: translateY(0); } 50% { transform: translateY(3px); } }

  @media (max-width: 640px) {
    .pain-grid, .outcomes-grid, .plans-grid { grid-template-columns: 1fr; }
    .audit-card-body { grid-template-columns: 1fr; }
    nav { padding: 0 16px; }

<!-- ═══════════════════════════════════════════════════════════════
     YAML PARSER (js-yaml 4.x — ~3KB gzipped)
     ═══════════════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

<script>
  // ══════════════════════════════════════════════════════════════
  // CONTENT LOADER — charge les YAML et injecte les textes
  // ══════════════════════════════════════════════════════════════
  const CONTENT = {};

  async function loadYAML(name) {
    const res = await fetch('content/' + name + '.yaml');
    const text = await res.text();
    CONTENT[name] = jsyaml.load(text);
  }

  function resolve(path) {
    const parts = path.split('.');
    const file = parts.shift();
    let val = CONTENT[file];
    for (const p of parts) {
      if (val == null) return undefined;
      val = val[p];
    }
    return val;
  }

  // ── Template renderers ────────────────────────────────────────
  const TPL = {
    meta(container, items) {
      container.innerHTML = items.map(m =>
        '<div class="hero-meta-item">' +
          '<span class="hero-meta-val">' + esc(m.val) + '</span>' +
          '<span class="hero-meta-label">' + esc(m.label) + '</span>' +
        '</div>'
      ).join('');
    },

    pain(container, items) {
      container.innerHTML = items.map(p =>
        '<div class="pain-item">' +
          '<div class="pain-icon">' + esc(p.icon) + '</div>' +
          '<div class="pain-title">' + esc(p.title) + '</div>' +
          '<div class="pain-desc">' + esc(p.desc) + '</div>' +
          '<div class="pain-quote">' + esc(p.quote) + '</div>' +
        '</div>'
      ).join('');
    },

    'audit-items'(container, items) {
      container.innerHTML = items.map(a =>
        '<div>' +
          '<div class="audit-item-title">' + esc(a.title) + '</div>' +
          '<div class="audit-item-val">' + esc(a.val) + '</div>' +
        '</div>'
      ).join('');
    },

    outcomes(container, items) {
      // Regenerate arrow elements (tracks, branches, arrowheads) in the sibling arrow col
      const arrowCol = container.closest('.outcomes-wrapper').querySelector('.audit-arrow-col');
      // Remove old arrow elements (keep trunk track + trunk)
      arrowCol.querySelectorAll('.audit-arrow-branch-track, .audit-arrow-branch, .audit-arrow-head').forEach(b => b.remove());
      items.forEach((_, i) => {
        const track = document.createElement('div');
        track.className = 'audit-arrow-branch-track';
        track.dataset.card = i;
        arrowCol.appendChild(track);

        const branch = document.createElement('div');
        branch.className = 'audit-arrow-branch';
        branch.dataset.card = i;
        arrowCol.appendChild(branch);

        const head = document.createElement('div');
        head.className = 'audit-arrow-head';
        head.dataset.card = i;
        arrowCol.appendChild(head);
      });

      container.innerHTML = items.map((o, i) =>
        '<div class="outcome-card oc-' + (i + 1) + '">' +
          '<div class="outcome-icon">' + esc(o.icon) + '</div>' +
          '<div class="outcome-title">' + esc(o.title) + '</div>' +
          '<div class="outcome-desc">' + esc(o.desc) + '</div>' +
        '</div>'
      ).join('');
    },

    'price-client'(container, data) {
      container.innerHTML =
        '<div class="price-block-header">' +
          '<span class="section-label" style="margin:0">' + esc(data.label) + '</span>' +
          '<span class="tag tag-grey">' + esc(data.tag) + '</span>' +
        '</div>' +
        '<div class="price-block-body">' +
          data.tiers.map((t, i) =>
            (i > 0 ? '<div class="price-tier-sep">→</div>' : '') +
            '<div class="price-tier">' +
              '<div class="price-tier-amount">' + esc(t.amount) + '</div>' +
              '<div class="price-tier-label">' + esc(t.label) + '</div>' +
              '<div class="price-tier-detail">' + esc(t.detail) + '</div>' +
            '</div>'
          ).join('') +
        '</div>' +
        '<div class="price-block-footer">' + esc(data.footer) + '</div>';
    },

    'price-agence'(container, data) {
      container.innerHTML =
        '<div class="price-block-header">' +
          '<span class="section-label" style="margin:0">' + esc(data.label) + '</span>' +
          '<span class="tag tag-grey">' + esc(data.tag) + '</span>' +
        '</div>' +
        '<div class="price-block-single">' +
          '<div class="price-block-amount">' + esc(data.amount) + '</div>' +
          '<div class="price-block-detail">' + (data.detail_html || esc(data.detail || '')) + '</div>' +
        '</div>' +
        '<div class="price-block-footer">' + esc(data.footer) + '</div>';
    },

    plans(container, items) {
      container.innerHTML = items.map((p, i) => {
        const featured = p.tag ? ' featured' : '';
        const ctaCls = p.tag ? 'plan-cta-featured' : 'plan-cta-default';
        const nameHtml = p.tag
          ? esc(p.name) + ' <span class="tag tag-accent">' + esc(p.tag) + '</span>'
          : esc(p.name);
        return '<div class="plan-card' + featured + '">' +
          '<div class="plan-name">' + nameHtml + '</div>' +
          '<div class="plan-price">' + esc(p.price) + '</div>' +
          '<div class="plan-period">' + esc(p.period) + '</div>' +
          '<div class="plan-divider"></div>' +
          '<ul class="plan-features">' +
            p.features.map(f =>
              '<li class="plan-feature"><span class="plan-feature-check">✓</span> ' + esc(f) + '</li>'
            ).join('') +
          '</ul>' +
          '<div class="plan-ideal">' + esc(p.ideal) + '</div>' +
          '<a href="#contact" class="plan-cta ' + ctaCls + '">' + esc(p.cta) + '</a>' +
        '</div>';
      }).join('');
    },

    conditions(container, data) {
      container.innerHTML =
        '<div class="conditions-block">' +
          '<div class="conditions-title">' + esc(data.title) + '</div>' +
          '<ul class="conditions-list">' +
            data.items.map(c =>
              '<li class="conditions-item">' +
                '<span class="conditions-dot"></span>' +
                '<span>' + esc(c) + '</span>' +
              '</li>'
            ).join('') +
          '</ul>' +
        '</div>';
    },

    terminal(container, data) {
      const linesHtml = data.lines.map(l => {
        if (l.type === 'blank') return '<span class="t-line">&nbsp;</span>';
        if (l.type === 'cmd') return '<span class="t-line"><span class="t-prompt">' + esc(l.prompt) + '</span><span class="t-cmd">' + esc(l.text) + '</span></span>';
        const cls = { comment: 't-comment', out: 't-out', success: 't-success', warn: 't-warn' }[l.type] || '';
        return '<span class="t-line ' + cls + '">' + esc(l.text) + '</span>';
      }).join('');

      container.innerHTML =
        '<div class="terminal-header">' +
          '<div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>' +
          '<span class="terminal-filename">' + esc(data.filename) + '</span>' +
        '</div>' +
        '<div class="terminal-body">' +
          linesHtml +
          '<span class="t-line"><span class="t-prompt">$ </span><span class="t-blink"></span></span>' +
        '</div>';
    },

    'footer-tags'(container, items) {
      container.innerHTML = items.map(t => '<span>' + esc(t) + '</span>').join('');
    }
  };

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderLogo(el, data) {
    el.innerHTML =
      '<span class="logo-line"><span class="initial">' + esc(data.line1_initial) + '</span>' + esc(data.line1) + '</span>' +
      '<span class="logo-line"><span class="initial">' + esc(data.line2_initial) + '</span>' + esc(data.line2) + '</span>' +
      '<span class="logo-line"><span class="initial">' + esc(data.line3_initial) + '</span>' + esc(data.line3) + '</span>';
  }

  function applyContent() {
    // Simple text bindings
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const val = resolve(el.dataset.i18n);
      if (val != null) el.textContent = val;
    });

    // HTML bindings (for titles with <br>)
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const val = resolve(el.dataset.i18nHtml);
      if (val != null) el.innerHTML = val;
    });

    // Href bindings
    document.querySelectorAll('[data-i18n-href]').forEach(el => {
      const val = resolve(el.dataset.i18nHref);
      if (val != null) el.href = val;
    });

    // Logo bindings
    document.querySelectorAll('[data-i18n-logo]').forEach(el => {
      const data = resolve(el.dataset.i18nLogo);
      if (data) renderLogo(el, data);
    });

    // Template bindings
    document.querySelectorAll('[data-tpl]').forEach(el => {
      const tplName = el.dataset.tpl;
      const data = resolve(el.dataset.src);
      if (data && TPL[tplName]) TPL[tplName](el, data);
    });
  }

  // ══════════════════════════════════════════════════════════════
  // INIT — load all YAML files then render
  // ══════════════════════════════════════════════════════════════
  Promise.all([
    loadYAML('common'),
    loadYAML('client'),
    loadYAML('agence')
  ]).then(() => {
    applyContent();
    initAnimations();
  });

  // ══════════════════════════════════════════════════════════════
  // MODE SWITCH
  // ══════════════════════════════════════════════════════════════
  const body = document.body;
  const switchEl = document.getElementById('mode-switch');
  const pill = document.getElementById('mode-pill');
  const options = switchEl.querySelectorAll('.mode-switch-option');

  function setMode(mode) {
    body.dataset.mode = mode;
    options.forEach(o => o.classList.toggle('active', o.dataset.mode === mode));
    positionPill();
    updateClientScrub();
    updateAgenceSwap();
    updateArrows();
  }

  function positionPill() {
    const active = switchEl.querySelector('.mode-switch-option.active');
    if (!active) return;
    pill.style.left = active.offsetLeft + 'px';
    pill.style.width = active.offsetWidth + 'px';
  }

  options.forEach(o => {
    o.addEventListener('click', () => setMode(o.dataset.mode));
  });

  requestAnimationFrame(positionPill);
  window.addEventListener('resize', positionPill);

  // ══════════════════════════════════════════════════════════════
  // ANIMATIONS (initialized after content is loaded)
  // ══════════════════════════════════════════════════════════════
  let scrubSpans = [];
  const SCRUB_START = 1;
  const SCRUB_END = 60;

  function initAnimations() {
    // CLIENT: FDP SCRUB (scroll-reveal dots)
    const scrubContainer = document.getElementById('fdp-scrub');
    if (scrubContainer) {
      const scrubText = resolve('common.hero.scrub_reveal') || ' Projet.';
      const parts = [
        { char: '.', cls: 'ellipsis' },
        { char: '.', cls: 'ellipsis' },
        { char: '.', cls: 'ellipsis' },
        { char: scrubText, cls: 'projet-word' },
      ];
      parts.forEach(({ char, cls }) => {
        const span = document.createElement('span');
        span.className = 'fdp-scrub-char' + (cls ? ' ' + cls : '');
        span.textContent = char;
        scrubContainer.appendChild(span);
      });
      scrubSpans = scrubContainer.querySelectorAll('.fdp-scrub-char');
    }

    // Trigger initial scroll state
    onScroll();
    updateArrows();
  }

  function updateClientScrub() {
    if (!scrubSpans.length) return;
    const sy = window.scrollY;
    const step = (SCRUB_END - SCRUB_START) / scrubSpans.length;
    scrubSpans.forEach((span, i) => {
      span.style.opacity = sy >= SCRUB_START + i * step ? '1' : '0';
    });
    const hint = document.getElementById('reveal-hint-client');
    if (hint) hint.classList.toggle('hidden', sy >= SCRUB_START);
  }

  // ══════════════════════════════════════════════════════════════
  // AGENCE: HERO WORD SWAP
  // ══════════════════════════════════════════════════════════════
  const swapEl = document.getElementById('hero-swap');
  const SWAP_THRESHOLD = 1;

  function updateAgenceSwap() {
    if (!swapEl) return;
    const sy = window.scrollY;
    if (sy >= SWAP_THRESHOLD) {
      swapEl.classList.add('revealed');
    } else {
      swapEl.classList.remove('revealed');
    }
    const hint = document.getElementById('reveal-hint-agence');
    if (hint) hint.classList.toggle('hidden', sy >= SWAP_THRESHOLD);
  }

  // ══════════════════════════════════════════════════════════════
  // ARROW ANIMATIONS
  // ══════════════════════════════════════════════════════════════
  function animateArrowSet(wrapper) {
    if (!wrapper || wrapper.offsetParent === null) return;
    const trunk = wrapper.querySelector('.audit-arrow-trunk');
    const branchTracks = wrapper.querySelectorAll('.audit-arrow-branch-track');
    const branches = wrapper.querySelectorAll('.audit-arrow-branch');
    const heads = wrapper.querySelectorAll('.audit-arrow-head');
    const cards = wrapper.querySelectorAll('.outcome-card');
    const grid = wrapper.querySelector('.outcomes-grid');
    if (!trunk || !grid) return;

    // Position branch tracks, branches and arrowheads at card centers
    cards.forEach((card, i) => {
      const cardMid = card.offsetTop + card.offsetHeight / 2;
      const y = cardMid + 'px';
      if (branchTracks[i]) branchTracks[i].style.top = y;
      if (branches[i]) branches[i].style.top = y;
      if (heads[i]) heads[i].style.top = y;
    });

    // Scroll-based: the "light" travels down the trunk following viewport
    const wrapperRect = wrapper.getBoundingClientRect();
    const triggerLine = window.innerHeight * 0.72;
    const scrollIntoWrapper = triggerLine - wrapperRect.top;
    const totalHeight = grid.offsetHeight;
    const trunkHeight = Math.max(0, Math.min(totalHeight, scrollIntoWrapper));

    trunk.style.height = trunkHeight + 'px';

    // Light up branches and cards as the trunk reaches them
    cards.forEach((card, i) => {
      const branchY = card.offsetTop + card.offsetHeight / 2;
      const reached = trunkHeight >= branchY;
      if (branches[i]) branches[i].classList.toggle('visible', reached);
      if (heads[i]) heads[i].classList.toggle('visible', reached);
      card.classList.toggle('lit', reached);
    });
  }

  function updateArrows() {
    animateArrowSet(document.getElementById('outcomes-wrapper-client'));
    animateArrowSet(document.getElementById('outcomes-wrapper-agence'));
  }

  // ══════════════════════════════════════════════════════════════
  // SCROLL LISTENER
  // ══════════════════════════════════════════════════════════════
  function onScroll() {
    updateClientScrub();
    updateAgenceSwap();
    updateArrows();
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
</script>

</body>
</html>
