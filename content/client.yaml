# ── Section Pain ──────────────────────────────
pain:
  label: Pourquoi Fils de Projet
  title: "Ce que vos prestataires ne font plus."
  desc: "Quand le suivi se perd"
  items:
    - icon: "⏳"
      title: Les délais
      desc: "3 jours pour un truc qui prend 10 minutes. Et encore, quand quelqu'un est disponible."
      quote: "\"Ce sera traité dans le courant de la semaine.\""
    - icon: "💸"
      title: "L'opacité"
      desc: "Tu paies un forfait, tu sais pas ce que ça couvre. Les surprises arrivent après la facture."
      quote: "\"Ce n'était pas inclus dans le scope validé.\""
    - icon: "🧱"
      title: Le mur technique
      desc: "Tu veux tester un SaaS, automatiser un flux, optimiser pour l'IA… ton presta sait pas faire."
      quote: "\"C'est pas dans notre périmètre de compétences.\""
    - icon: "🔇"
      title: La traduction impossible
      desc: "Ton dev parle en tickets Jira. Toi tu parles en résultats. Personne ne fait le lien."
      quote: "\"Tu peux me refaire un brief plus technique ?\""
    - icon: "👻"
      title: Le turnover
      desc: "Ton interlocuteur change, personne ne connaît ton historique. Tu re-expliques tout de zéro."
      quote: "\"Je reprends le dossier, tu peux me re-contextualiser ?\""
    - icon: "🕸️"
      title: Le site qui prend la poussière
      desc: "Personne ne surveille, personne ne propose rien. Tu t'en rends compte quand ça plante."
      quote: "\"Ah oui, on avait pas vu que le certificat avait expiré.\""


# ── Section Audit ─────────────────────────────
audit:
  label: Première étape
  title: "L'audit, sans bégayer"
  desc: >
    Avant de toucher quoi que ce soit, je te dis la vérité sur ton site.
    Ce qui coûte trop cher. Ce qui flingue tes perfs. Ce qu'on peut en faire.
  card:
    title: "Périmètre de l'audit"
    tag_accent: Inclus
    tag_grey: "5–7 jours ouvrés"
    items:
      - title: Fonctionnel
        val: "UX visiteur et admin, parcours de conversion, best practices e-commerce, périmètre fonctionnel vs besoins réels"
      - title: Technique
        val: "Core Web Vitals, sécurité, mises à jour manquantes, bugs visuels et fonctionnels"
      - title: "SEO & Tracking"
        val: "Structure, balises, GTM, GA4, pixels — vérification de ce qui est réellement tracké"
      - title: Analyse des coûts
        val: "Hébergement, plugins premium, abonnements — identification de ce qu'on peut couper"
  outcomes:
    - icon: "⚡"
      title: One-shot de correction
      desc: "Site globalement sain. Quelques problèmes ciblés à régler, puis termino pipo."
    - icon: "🔄"
      title: Suivi long terme
      desc: "Le site a de la valeur et nécessite un accompagnement régulier. On met en place un plan."
    - icon: "🚀"
      title: Refonte ou migration
      desc: "La stack actuelle est inadaptée ou trop coûteuse (ou trop relou). On évalue ensemble la meilleure option."
  price:
    label: Tarif audit
    tag: Sans engagement
    tiers:
      - amount: "500 €"
        label: "CMS standard · Stack simple"
        detail: "Wordpress, Shopify · solutions natives"
      - amount: "900 €"
        label: "Headless, CMS Maison · Stack custom"
        detail: "Shopify Custom , Contentful, WooCommerce · solutions sur-mesure"
    footer: "Livraison 5–7 jours ouvrés · HT"

# ── Section Plans ─────────────────────────────
plans:
  label: Formules
  title: "Pas d'abonnement piège."
  desc: "Pas de préavis contractuel. Tu restes parce que c'est rentable, pas parce que t'as signé quelque chose."
  items:
    - name: Essentiel
      price: "290€"
      period: "/ mois HT"
      features:
        - "Mises à jour CMS, thème, plugins"
        - "Monitoring uptime + alertes"
        - "1h d'intervention mensuelle"
        - "Réponse sous 48h ouvrées"
      ideal: "Site vitrine stable — peu d'évolutions attendues."
      cta: Démarrer
    - name: Actif
      tag: Recommandé
      price: "590€"
      period: "/ mois HT"
      features:
        - "Tout l'Essentiel inclus"
        - "Suggestion d'améliorations mensuelles"
        - "4h de dev / modifications / mois"
        - "Rapport mensuel + recommandations"
        - "Réponse sous 24h ouvrées"
      ideal: "Site actif — des besoins réguliers de contenu ou d'évolutions légères."
      cta: Démarrer
    - name: Partenaire
      price: "990€"
      period: "/ mois HT"
      features:
        - "Tout l'Actif inclus"
        - "Roadmap proactive mensuelle"
        - "8h de dev / mois"
        - "Canal Slack dédié"
        - "Réponse sous 4h · SLA critique 24h"
      ideal: "E-commerçants, startups — le site est un levier business central."
      cta: Démarrer
  conditions:
    title: Conditions
    items:
      - "Aucun engagement de durée — tu pars quand tu veux, sans préavis."
      - "Les heures non consommées sont reportées au mois suivant."
      - "Les dépassements sont rattrapés — déduits de ton crédit disponible."

# ── Terminal ──────────────────────────────────
terminal:
  filename: fdp-audit.sh
  lines:
    - type: cmd
      prompt: "$ "
      text: "./audit --url votre-site.fr"
    - type: comment
      text: "# Analyse en cours — je regarde tout. Vraiment."
    - type: out
      text: "✓  Core Web Vitals analysés"
    - type: warn
      text: "⚠  4 plugins inactifs détectés  →  économie possible : 47€/mois"
    - type: warn
      text: "⚠  GTM mal configuré  →  3 événements non trackés"
    - type: warn
      text: "⚠  SSL expire dans 12 jours"
    - type: out
      text: "✓  Hébergement surdimensionné  →  migration recommandée"
    - type: blank
    - type: cmd
      prompt: "$ "
      text: "./rapport --output pdf --ton honnête"
    - type: success
      text: "→  Livraison estimée : 5 jours ouvrés"
    - type: success
      text: "→  Économies identifiées : 113€/mois"
    - type: success
      text: "→  Recommandation : Formule Actif + migration hébergeur"
    - type: blank
    - type: comment
      text: "# Évolutions identifiées"
    - type: cmd
      prompt: "$ "
      text: "./todo --type evolutions"
    - type: out
      text: "[ ]  flux Google Shopping  →  finaliser mapping produits"
    - type: out
      text: "[ ]  checkout  →  bandeau délais de livraison"
    - type: out
      text: "[ ]  facturation studio  →  automatiser envoi mensuel"
    - type: warn
      text: "[ ]  RDV Agence — brief refonte  →  17h00 à confirmer"
    - type: comment
      text: "# 4 tâches · ~3h estimées · inclus dans formule Partenaire"

